name: Pipeline DataOps Bank Telemarketing

on:
  push:
    branches:
      - main
      - master

jobs:
  ejecutar-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar el repositorio
      uses: actions/checkout@v3

    - name: 2. Configurar Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Ejecutar Fase 1 - Ingesta
      run: python src/ingesta.py

    - name: 5. Ejecutar Fase 2 - Limpieza
      run: python src/limpieza.py

    - name: 6. Ejecutar Fase 3 - Validación
      run: python src/validacion.py

    - name: 7. Ejecutar Fase 4 - Carga
      run: python src/carga.py
